<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciando sesión… — Tar-IA</title>
<link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card" style="text-align:center">
    <div class="login-logo">Tar-IA</div>
    <div class="login-tag">Iniciando sesión…</div>
    <div style="display:flex;justify-content:center;margin-top:10px">
      <div class="spinner" style="border-color:rgba(200,242,48,.25);border-top-color:var(--accent)"></div>
    </div>
  </div>
</div>
<script src="../../js/api.js"></script>
<script>
  // El backend ya NO manda el JWT en la URL: manda un código EFÍMERO (60s, un solo
  // uso) que aquí se cambia por el JWT vía POST. Así el token de sesión nunca queda
  // en historial, logs ni referrer. Se usa location.replace para que ni siquiera el
  // código efímero quede en el historial.
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const legado = params.get('token');   // compatibilidad con el flujo anterior

  function irLogin(msg){
    window.location.replace(BASE + '/login.html?msg=' + encodeURIComponent(msg));
  }

  if(code){
    fetch(`${API_URL}/auth/exchange`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    }).then(async r => {
      const data = await r.json().catch(() => ({}));
      if(!r.ok || !data.token) throw new Error(data.detail || 'No se pudo iniciar sesión');
      setToken(data.token);
      window.location.replace(BASE + '/panel.html');
    }).catch(e => irLogin(e.message || 'No se pudo iniciar sesión'));
  } else if(legado){
    setToken(legado);
    window.location.replace(BASE + '/panel.html');
  } else {
    irLogin('No se recibió el código de autenticación');
  }
</script>
</body>
</html>
