<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciando sesión… — Tar-IA</title>
<link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card" style="text-align:center">
    <div class="login-logo">Tar-IA</div>
    <div class="login-tag">Iniciando sesión…</div>
    <div style="display:flex;justify-content:center;margin-top:10px">
      <div class="spinner" style="border-color:rgba(200,242,48,.25);border-top-color:var(--accent)"></div>
    </div>
  </div>
</div>
<script src="../../js/api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if(token){
    setToken(token);
    window.location.href = '/panel.html';
  } else {
    window.location.href = '/login.html?msg=No se recibió token de autenticación';
  }
</script>
</body>
</html>
