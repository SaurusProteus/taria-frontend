<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Aplica el tema ANTES del primer paint (evita el flashazo blanco al recargar) -->
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('taria_theme')||'dark');}catch(e){}</script>
<title>Tar-IA — Inicia sesión</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230b0d10'/><text y='.9em' font-size='72' x='14' fill='%23c8f230' font-family='monospace' font-weight='bold'>T</text></svg>">
<link rel="stylesheet" href="./css/style.css">
<style>
  /* Login limpio: card centrada sobre fondo oscuro con glow lima sutil */
  .login-shell{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;
    background:radial-gradient(ellipse 52% 46% at 50% 42%, rgba(200,242,48,.10), var(--bg) 72%)}
  .login-shell::before{content:'';position:absolute;inset:0;opacity:.5;pointer-events:none;
    background-image:linear-gradient(rgba(200,242,48,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,242,48,.04) 1px,transparent 1px);
    background-size:44px 44px;mask-image:radial-gradient(ellipse 60% 55% at 50% 40%,#000,transparent 75%)}
  .login-back{position:absolute;top:20px;left:24px;z-index:2;color:var(--text3);text-decoration:none;font-size:13px;font-family:'Space Mono',monospace}
  .login-back:hover{color:var(--accent-text)}
  .login-theme{position:absolute;top:16px;right:24px;z-index:2}
</style>
</head>
<body>

<div class="login-shell">
  <a href="./index.html" class="login-back">← Volver al inicio</a>
  <button class="btn-theme login-theme" id="btn-theme" title="Cambiar a modo claro">☀️</button>

  <div class="login-card">
    <!-- Nerdy · mascota de Tar-IA (sostiene la palomita) -->
    <svg class="login-mascot" width="76" height="95" viewBox="0 0 120 150" fill="none" aria-hidden="true" style="display:block;margin:0 auto 10px">
      <ellipse cx="60" cy="142" rx="38" ry="6" fill="#000" opacity=".35"/>
      <rect x="30" y="92" width="60" height="46" rx="16" fill="#1f2a22"/>
      <rect x="28" y="28" width="64" height="60" rx="17" fill="#ECE8D8"/>
      <circle cx="48" cy="58" r="11" fill="#0b0d10"/><circle cx="72" cy="58" r="11" fill="#0b0d10"/>
      <circle cx="48" cy="58" r="4" fill="#c8f230"/><circle cx="72" cy="58" r="4" fill="#c8f230"/>
      <line x1="59" y1="57" x2="61" y2="57" stroke="#0b0d10" stroke-width="3" stroke-linecap="round"/>
      <rect x="74" y="96" width="34" height="34" rx="9" fill="#c8f230"/>
      <path d="M82 113l5 5 9-11" stroke="#0b0d10" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <div class="login-logo">Tar-IA</div>
    <div class="login-tag">Entra con tu cuenta para empezar a calificar</div>

    <div id="error-box"></div>

    <a href="#" id="btn-google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuar con Google
    </a>

    <div class="login-or"><span>o con tu correo</span></div>

    <form id="email-form" autocomplete="on">
      <input type="text" id="f-name" class="login-input" placeholder="Tu nombre" style="display:none">
      <input type="email" id="f-email" class="login-input" placeholder="correo@ejemplo.com" autocomplete="email" required>
      <input type="password" id="f-pass" class="login-input" placeholder="Contraseña" autocomplete="current-password" required>
      <button type="submit" id="f-submit" class="btn-email">Iniciar sesión</button>
    </form>

    <div class="login-forgot" id="forgot-wrap"><a href="#" id="forgot-link">¿Olvidaste tu contraseña?</a></div>

    <div class="login-switch">
      <span id="switch-text">¿No tienes cuenta?</span>
      <a href="#" id="switch-link">Crea una</a>
    </div>

    <div class="login-foot">Al continuar aceptas el uso responsable del servicio.<br>¿Problemas para entrar? <a href="https://wa.me/524464036213" target="_blank">Escríbenos</a></div>
  </div>
</div>

<script src="./js/api.js"></script>
<script>
  // Si ya hay sesión, directo al panel
  if(getToken()){ window.location.href = (window.location.pathname.startsWith('/taria-frontend') ? '/taria-frontend' : '') + '/panel.html'; }

  document.getElementById('btn-google').addEventListener('click', function(e){
    e.preventDefault();
    window.location.href = `${API_URL}/auth/google/login`;
  });

  // Mostrar error si venimos de un callback fallido
  const params = new URLSearchParams(window.location.search);
  const msg = params.get('msg');
  if(msg){
    document.getElementById('error-box').innerHTML =
      `<div class="alert alert-error" style="margin-bottom:24px;text-align:left">No pudimos iniciar sesión: ${msg}</div>`;
  }
  if(params.get('verified') === '1'){
    document.getElementById('error-box').innerHTML =
      `<div class="alert alert-success" style="margin-bottom:24px;text-align:left">✓ ¡Correo verificado! Ya puedes iniciar sesión y calificar.</div>`;
  }

  // ── Login / Registro / Recuperación con correo ──
  const PANEL = (window.location.pathname.startsWith('/taria-frontend') ? '/taria-frontend' : '') + '/panel.html';
  let modo = 'login'; // 'login' | 'register' | 'forgot'
  const fName = document.getElementById('f-name');
  const fPass = document.getElementById('f-pass');
  const fSubmit = document.getElementById('f-submit');
  const switchText = document.getElementById('switch-text');
  const switchLink = document.getElementById('switch-link');
  const forgotWrap = document.getElementById('forgot-wrap');
  const errorBox = document.getElementById('error-box');

  const LABELS = {
    login:    { submit:'Iniciar sesión', busy:'Entrando…' },
    register: { submit:'Crear cuenta',   busy:'Creando…' },
    forgot:   { submit:'Enviar enlace',  busy:'Enviando…' },
  };

  function setModo(m){
    modo = m;
    fName.style.display = (m === 'register') ? 'block' : 'none';
    fName.required = (m === 'register');
    fPass.style.display = (m === 'forgot') ? 'none' : 'block';
    fPass.required = (m !== 'forgot');
    fPass.setAttribute('autocomplete', m === 'register' ? 'new-password' : 'current-password');
    fSubmit.textContent = LABELS[m].submit;
    forgotWrap.style.display = (m === 'login') ? 'block' : 'none';
    switchText.textContent = (m === 'register') ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?';
    switchLink.textContent = (m === 'register') ? 'Inicia sesión' : 'Crea una';
    errorBox.innerHTML = '';
  }
  switchLink.addEventListener('click', e => { e.preventDefault(); setModo(modo === 'register' ? 'login' : 'register'); });
  document.getElementById('forgot-link').addEventListener('click', e => { e.preventDefault(); setModo('forgot'); });

  document.getElementById('email-form').addEventListener('submit', async e => {
    e.preventDefault();
    errorBox.innerHTML = '';
    const email = document.getElementById('f-email').value.trim();
    fSubmit.disabled = true;
    fSubmit.textContent = LABELS[modo].busy;
    try{
      if(modo === 'forgot'){
        await fetch(`${API_URL}/auth/forgot-password`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email })
        });
        errorBox.innerHTML = `<div class="alert alert-success" style="margin-bottom:20px;text-align:left">Si existe una cuenta con ese correo, te enviamos un enlace para restablecer tu contraseña. Revisa tu bandeja (y spam).</div>`;
        fSubmit.disabled = false; fSubmit.textContent = LABELS[modo].submit;
        return;
      }
      const body = { email, password: fPass.value };
      if(modo === 'register') body.name = fName.value.trim();
      const r = await fetch(`${API_URL}${modo === 'register' ? '/auth/register' : '/auth/login'}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body),
      });
      const data = await r.json().catch(() => ({}));
      if(!r.ok) throw new Error(data.detail || 'No se pudo completar la operación');
      setToken(data.token);
      window.location.href = PANEL;
    }catch(err){
      let m = err.message;
      if(m === 'Failed to fetch' || err instanceof TypeError){
        m = 'No pudimos conectar con el servidor. Revisa tu conexión e inténtalo de nuevo.';
      }
      errorBox.innerHTML = `<div class="alert alert-error" style="margin-bottom:20px;text-align:left">${m}</div>`;
      fSubmit.disabled = false;
      fSubmit.textContent = LABELS[modo].submit;
    }
  });
</script>
</body>
</html>
